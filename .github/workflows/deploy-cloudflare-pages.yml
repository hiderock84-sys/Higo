name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Verify build artifacts
        run: |
          test -f dist/index.html
          test -f dist/_headers
          test -f dist/static/style.css
          grep -q 'info-sheet' dist/index.html
          grep -q 'hero-kyushu-green' dist/index.html

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT || 'higo' }} --commit-dirty=true

      - name: Deployment summary
        if: success()
        run: |
          echo "Deployed to Cloudflare Pages project: ${{ vars.CLOUDFLARE_PAGES_PROJECT || 'higo' }}"
          echo "Verify: https://higo-8il.pages.dev/static/hero-cover-aso-kumamoto.jpg?v=20260521b"
